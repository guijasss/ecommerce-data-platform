services:
  event-generator:
    build:
      context: .
      dockerfile: apps/event_generator/Dockerfile
    volumes:
      - ./apps/event_generator:/app/event_generator
      - ./reference-data:/app/reference-data
    environment:
      PYTHONUNBUFFERED: "1"
      DATABRICKS_HOST: ${DATABRICKS_HOST:-}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
      DATABRICKS_VOLUME_PATH: ${DATABRICKS_VOLUME_PATH:-}
    command:
      [
        "python",
        "-m",
        "event_generator.main",
        "--flows",
        "0",
        "--interval-ms",
        "500",
        "--purchase-probability",
        "0.35"
      ]
