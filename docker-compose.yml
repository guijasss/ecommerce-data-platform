services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ecommerce-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: ecommerce-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecommerce-kafka-ui
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  event-generator:
    build:
      context: .
      dockerfile: apps/event_generator/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./auth:/app/auth:ro
    environment:
      PYTHONUNBUFFERED: "1"
      EVENT_GENERATOR_TARGET: ${EVENT_GENERATOR_TARGET:-local}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      AIVEN_KAFKA_BOOTSTRAP_SERVERS: ${AIVEN_KAFKA_BOOTSTRAP_SERVERS:-}
      AIVEN_KAFKA_AUTH_MODE: ${AIVEN_KAFKA_AUTH_MODE:-}
      AIVEN_KAFKA_SASL_MECHANISM: ${AIVEN_KAFKA_SASL_MECHANISM:-}
      AIVEN_KAFKA_USERNAME: ${AIVEN_KAFKA_USERNAME:-}
      AIVEN_KAFKA_PASSWORD: ${AIVEN_KAFKA_PASSWORD:-}
      AIVEN_KAFKA_SSL_CA: ${AIVEN_KAFKA_SSL_CA:-}
      AIVEN_KAFKA_SSL_CERT: ${AIVEN_KAFKA_SSL_CERT:-}
      AIVEN_KAFKA_SSL_KEY: ${AIVEN_KAFKA_SSL_KEY:-}
    command:
      [
        "python",
        "-m",
        "event_generator.main",
        "--flows",
        "0",
        "--interval-ms",
        "500",
        "--purchase-probability",
        "0.35"
      ]
